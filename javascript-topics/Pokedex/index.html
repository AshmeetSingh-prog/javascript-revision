<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Document</title>
      <link rel="stylesheet" href="style.css">
</head>
<body>
      <div id="comscr">
            <header id="head">
                  <img src="PokedexLogo.jpg" alt="" id="PokeLogo">
            </header>
            <div id="pokeCont">
                  <div id="nav">
                        <input type="text" name="pokeSearch" id="Pokeser" placeholder="Enter Pokemon">
                        <button type="button" id="Pokebut">Search</button>
                  </div>
                  <div id="imgSec">
                        <div id="img"></div>
                  </div>
                  <div id="infoSec">
                        <div class="infotext" id="infName">Name : </div>
                        <div class="infotext" id="infId">ID : </div>
                        <div class="infotext" id="infType">Type : </div>
                        <div class="infotext" id="infHgt">Height : </div>
                        <div class="infotext" id="infWgt">Weight : </div>
                        <div class="infotext" id="infAbt">Ability : </div>

                  </div>

            </div>
      </div>
</body>
<script src="script.js"></script>
</html>
