<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Document</title>
      <link rel="stylesheet" href="style.css">
</head>
<body>
      <div id="comscr">
            <div data-purpose="Shows Error when user inputs invalid pokemon" id="err" class=""></div>
            <header id="head">
                  <img src="PokedexLogo.jpg" alt="" id="PokeLogo">
            </header>
            <div id="pokeCont">
                  <div id="nav">
                        <input type="text" name="pokeSearch" id="Pokeser" placeholder="Enter Pokemon" value="pikachu">
                        <button type="button" id="Pokebut">Search</button>
                  </div>
                  <div id="imgSec">
                        <div class="move">
                              <span id="prev"> < </span>
                        </div>
                        <img src="" alt="" id="img">
                        <div class="move" id="next">
                              <span id="next"> > </span>
                        </div>
                  </div>
                  <div id="infoSec">
                        <div class="infotext">Name : <span id="infName"></span></div>
                        <div class="infotext">ID : <span id="infId"></span></div>
                        <div class="infotext">Type : <span id="infType"></span></div>
                        <div class="infotext">Height : <span id="infHgt"></span></div>
                        <div class="infotext">Weight : <span id="infWgt"></span></div>
                        <div class="infotext">Ability : <span id="infAbt"></span></div>
                  </div>

            </div>
      </div>
</body>
<script src="script.js"></script>
</html>
